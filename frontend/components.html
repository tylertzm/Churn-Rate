<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Components | SumUp Churn Intelligence</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; }
        .enterprise-border { border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Icon Component - prevents DOM conflicts by using direct SVG
        const Icon = ({ name, size = 24, className = "" }) => {
            return (
                <span 
                    className={className} 
                    style={{ 
                        width: size, 
                        height: size, 
                        display: 'inline-flex',
                        alignItems: 'center',
                        justifyContent: 'center'
                    }}
                >
                    <svg 
                        width={size} 
                        height={size} 
                        viewBox="0 0 24 24" 
                        fill="none" 
                        stroke="currentColor" 
                        strokeWidth="2" 
                        strokeLinecap="round" 
                        strokeLinejoin="round"
                        dangerouslySetInnerHTML={{ __html: getIconPath(name) }}
                    />
                </span>
            );
        };

        // Simple icon paths (add more as needed)
        const getIconPath = (name) => {
            const icons = {
                'database': '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>',
                'arrow-left': '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
                'loader-2': '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>',
                'alert-triangle': '<path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
                'chevron-up': '<path d="m18 15-6-6-6 6"/>',
                'chevron-down': '<path d="m6 9 6 6 6-6"/>',
                'search': '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
                'x': '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>'
            };
            return icons[name] || '';
        };

        const ComponentsPage = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [filters, setFilters] = useState({});
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
            const [activeTab, setActiveTab] = useState('review');
            const [expandedCell, setExpandedCell] = useState(null);

            // Column groups
            const columnGroups = {
                review: { label: 'Review Info', columns: ['rating', 'title', 'body'] },
                timeline: { label: 'Timeline', columns: ['date', 'date_raw'] },
                analysis: { label: 'Analysis', columns: ['issue_list', 'is_business', 'churn_score', 'churn_risk_level'] }
            };

            const fixedColumn = 'name';

            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                try {
                    const response = await fetch('http://localhost:8000/api/churn/results');
                    if (!response.ok) {
                        throw new Error('No data available. Please run analysis first.');
                    }
                    const result = await response.json();
                    setData(result.all_analyzed || []);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') {
                    direction = 'desc';
                }
                setSortConfig({ key, direction });
            };

            const handleFilterChange = (key, value) => {
                setFilters(prev => ({
                    ...prev,
                    [key]: value
                }));
            };

            const getFilteredAndSortedData = () => {
                let processedData = [...data];

                // Apply filters
                Object.keys(filters).forEach(key => {
                    if (filters[key]) {
                        processedData = processedData.filter(item => {
                            const value = String(item[key]).toLowerCase();
                            return value.includes(filters[key].toLowerCase());
                        });
                    }
                });

                // Apply sorting
                if (sortConfig.key) {
                    processedData.sort((a, b) => {
                        const aVal = a[sortConfig.key];
                        const bVal = b[sortConfig.key];
                        
                        // Handle numbers
                        if (typeof aVal === 'number' && typeof bVal === 'number') {
                            return sortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
                        }
                        
                        // Handle strings
                        const aStr = String(aVal).toLowerCase();
                        const bStr = String(bVal).toLowerCase();
                        
                        if (aStr < bStr) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (aStr > bStr) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }

                return processedData;
            };

            const filteredData = getFilteredAndSortedData();

            const getVisibleColumns = () => {
                return [fixedColumn, ...columnGroups[activeTab].columns];
            };

            const formatCellValue = (value, maxLength = 40) => {
                const strValue = String(value);
                if (strValue.length > maxLength) {
                    return strValue.substring(0, maxLength) + '...';
                }
                return strValue;
            };

            const handleCellClick = (rowIndex, columnKey, fullValue) => {
                setExpandedCell({ rowIndex, columnKey, value: fullValue });
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50">
                        <div className="text-center">
                            <Icon name="loader-2" size={48} className="animate-spin text-[#0066FF] mx-auto mb-4" />
                            <p className="text-[10px] font-bold uppercase tracking-widest text-slate-400">Loading data components...</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50">
                        <div className="text-center">
                            <Icon name="alert-triangle" size={48} className="text-red-500 mx-auto mb-4" />
                            <p className="text-sm text-red-600 mb-6">{error}</p>
                            <a href="/" className="inline-flex items-center gap-2 px-4 py-2 bg-[#0066FF] text-white rounded-lg hover:bg-[#0052CC] transition-colors text-[10px] font-bold uppercase tracking-widest">
                                <Icon name="arrow-left" size={12} />
                                Back to Dashboard
                            </a>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen lg:h-screen p-4 md:p-6 flex flex-col overflow-y-auto lg:overflow-hidden bg-slate-50 text-slate-800">
                    <div className="max-w-7xl mx-auto w-full flex-1 min-h-0 flex flex-col gap-4">
                        
                        {/* Global Navigation */}
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center px-5 py-4 shrink-0 bg-white border border-slate-200 rounded-xl shadow-sm">
                            <div className="flex items-center gap-4">
                                <div className="p-1">
                                    <img 
                                        src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/SumUp_Logo.svg/250px-SumUp_Logo.svg.png" 
                                        alt="SumUp" 
                                        className="h-5 w-auto"
                                    />
                                </div>
                                <div className="h-6 w-px bg-slate-200 hidden md:block" />
                                <div>
                                    <h1 className="text-base font-bold tracking-tight text-slate-800">Data Components Registry</h1>
                                    <p className="text-[10px] text-slate-400 mt-0.5">Individual datapoints contributing to churn analysis (N={data.length})</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3 mt-3 md:mt-0">
                                <a 
                                    href="/"
                                    className="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-200 text-[10px] font-bold uppercase tracking-widest transition-all bg-white text-slate-700 hover:bg-slate-50"
                                >
                                    <Icon name="arrow-left" size={12} />
                                    Back to Dashboard
                                </a>
                                <div className="px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 shadow-sm shadow-emerald-200"></span>
                                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest leading-none">System Operational</span>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 min-h-0">
                            <div className="h-full min-h-0 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                                <div className="px-6 py-4 border-b border-slate-100 bg-slate-50/50 shrink-0">
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <div className="w-8 h-8 rounded-lg bg-[#0066FF]/10 text-[#0066FF] flex items-center justify-center">
                                                <Icon name="database" size={16} />
                                                </div>
                                                <div>
                                                    <p className="text-[10px] text-slate-400">
                                                        Showing {filteredData.length} of {data.length} reviews
                                                    </p>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={() => setFilters({})}
                                                className="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-600 transition-colors"
                                            >
                                                Clear Filters
                                            </button>
                                        </div>
                                    </div>

                                    {/* Tab Navigation */}
                                    <div className="flex gap-2 mt-4">
                                        {Object.entries(columnGroups).map(([key, group]) => (
                                            <button
                                                key={key}
                                                onClick={() => setActiveTab(key)}
                                                className={`px-4 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all ${
                                                    activeTab === key
                                                        ? 'bg-[#0066FF] text-white shadow-sm'
                                                        : 'bg-slate-100 text-slate-500 hover:bg-slate-200'
                                                }`}
                                            >
                                                {group.label}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="overflow-auto flex-1">
                                        <table className="min-w-full divide-y divide-slate-100">
                                            <thead className="bg-slate-50">
                                                <tr>
                                                    <th className="px-4 py-2 text-left border-b border-slate-200 bg-slate-50 sticky top-0 left-0 z-30 shadow-sm w-16">
                                                        <div className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">
                                                            #
                                                        </div>
                                                    </th>
                                                    {data.length > 0 && getVisibleColumns().map(key => (
                                                        <th key={key} className={`px-4 py-2 text-left border-b border-slate-200 bg-slate-50 ${key === fixedColumn ? 'sticky top-0 left-16 z-30 shadow-sm' : 'sticky top-0 z-20'}`}>
                                                            <div className="flex flex-col gap-1">
                                                                <button
                                                                    onClick={() => handleSort(key)}
                                                                    className="flex items-center gap-1 text-[9px] font-bold text-slate-400 uppercase tracking-widest hover:text-slate-600 transition-colors"
                                                                >
                                                                    {key.replace(/_/g, ' ')}
                                                                    {sortConfig.key === key && (
                                                                        <Icon 
                                                                            name={sortConfig.direction === 'asc' ? 'chevron-up' : 'chevron-down'} 
                                                                            size={12} 
                                                                        />
                                                                    )}
                                                                </button>
                                                                <input
                                                                    type="text"
                                                                    placeholder="Filter..."
                                                                    value={filters[key] || ''}
                                                                    onChange={(e) => handleFilterChange(key, e.target.value)}
                                                                    className="w-full px-2 py-1 text-[10px] border border-slate-200 rounded bg-white focus:outline-none focus:ring-1 focus:ring-[#0066FF] focus:border-[#0066FF]"
                                                                />
                                                            </div>
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody className="bg-white divide-y divide-slate-50">
                                                {filteredData.map((item, rowIndex) => (
                                                    <tr key={rowIndex} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="px-4 py-3 text-[11px] text-slate-500 font-bold sticky left-0 bg-white z-10 shadow-sm w-16">
                                                            {rowIndex + 1}
                                                        </td>
                                                        {getVisibleColumns().map((key) => {
                                                            const value = item[key];
                                                            const isFixed = key === fixedColumn;
                                                            return (
                                                                <td 
                                                                    key={key} 
                                                                    className={`px-4 py-3 text-[11px] text-slate-700 font-medium cursor-pointer hover:bg-[#0066FF]/5 ${isFixed ? 'sticky left-16 bg-white z-10 shadow-sm' : ''}`}
                                                                    onClick={() => handleCellClick(rowIndex, key, value)}
                                                                >
                                                                    {typeof value === 'boolean' ? (
                                                                        <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-[9px] font-bold ${value ? 'bg-emerald-50 text-emerald-700' : 'bg-slate-100 text-slate-600'}`}>
                                                                            {value ? 'Yes' : 'No'}
                                                                        </span>
                                                                    ) : (
                                                                        <span className="block">{formatCellValue(value)}</span>
                                                                    )}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                        
                                        {filteredData.length === 0 && data.length > 0 && (
                                            <div className="px-6 py-20 text-center">
                                                <Icon name="search" size={48} className="text-slate-300 mx-auto mb-4" />
                                                <p className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">No Results Found</p>
                                                <button 
                                                    onClick={() => setFilters({})}
                                                    className="text-[10px] font-bold uppercase tracking-widest text-[#0066FF] hover:text-[#0052CC]"
                                                >
                                                    Clear Filters
                                                </button>
                                            </div>
                                        )}
                                    </div>

                                    {data.length === 0 && (
                                        <div className="px-6 py-20 text-center">
                                            <Icon name="database" size={48} className="text-slate-300 mx-auto mb-4" />
                                            <p className="text-[10px] font-bold uppercase tracking-widest text-slate-400">No Data Components Available</p>
                                        </div>
                                    )}
                                </div>
                        </div>

                        {/* Expanded Cell Modal */}
                        {expandedCell && (
                            <div 
                                className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"
                                onClick={() => setExpandedCell(null)}
                            >
                                <div 
                                    className="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[80vh] overflow-auto"
                                    onClick={(e) => e.stopPropagation()}
                                >
                                    <div className="sticky top-0 bg-slate-50 border-b border-slate-200 px-6 py-4 flex items-center justify-between">
                                        <div>
                                            <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400">
                                                {expandedCell.columnKey.replace(/_/g, ' ')}
                                            </h3>
                                            <p className="text-[10px] text-slate-400 mt-0.5">
                                                Row {expandedCell.rowIndex + 1}
                                            </p>
                                        </div>
                                        <button
                                            onClick={() => setExpandedCell(null)}
                                            className="p-2 hover:bg-slate-200 rounded-lg transition-colors"
                                        >
                                            <Icon name="x" size={16} />
                                        </button>
                                    </div>
                                    <div className="px-6 py-6">
                                        <div className="text-sm text-slate-700 font-medium whitespace-pre-wrap break-words">
                                            {String(expandedCell.value)}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        // Use createRoot properly and disable strict mode to avoid double-render issues
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ComponentsPage />);
    </script>
</body>
</html>
