<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churn Data Components | SumUp Enterprise</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Icon Component for Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const ComponentsPage = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                try {
                    const response = await fetch('/api/churn/results');
                    if (!response.ok) {
                        throw new Error('No data available. Please run analysis first.');
                    }
                    const result = await response.json();
                    setData(result.all_analyzed || []);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <Icon name="loader" size={48} className="animate-spin text-blue-500 mx-auto mb-4" />
                            <p className="text-lg">Loading data components...</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <Icon name="alert-triangle" size={48} className="text-red-500 mx-auto mb-4" />
                            <p className="text-lg text-red-600">{error}</p>
                            <a href="/" className="mt-4 inline-block px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                                Back to Dashboard
                            </a>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50">
                    <header className="bg-white shadow-sm border-b">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center space-x-4">
                                    <Icon name="database" size={32} className="text-blue-600" />
                                    <div>
                                        <h1 className="text-2xl font-bold text-gray-900">Data Components</h1>
                                        <p className="text-sm text-gray-600">Individual datapoints contributing to churn analysis</p>
                                    </div>
                                </div>
                                <a href="/" className="px-4 py-2 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 flex items-center space-x-2">
                                    <Icon name="arrow-left" size={16} />
                                    <span>Back to Dashboard</span>
                                </a>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <div className="bg-white rounded-lg shadow-sm overflow-hidden">
                            <div className="px-6 py-4 border-b border-gray-200">
                                <h2 className="text-lg font-semibold text-gray-900">
                                    Analyzed Reviews ({data.length} total)
                                </h2>
                                <p className="text-sm text-gray-600 mt-1">
                                    Each row represents a customer review that was analyzed for churn indicators
                                </p>
                            </div>

                            <div className="overflow-x-auto">
                                <table className="min-w-full divide-y divide-gray-200">
                                    <thead className="bg-gray-50">
                                        <tr>
                                            {data.length > 0 && Object.keys(data[0]).map(key => (
                                                <th key={key} className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                    {key.replace(/_/g, ' ')}
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody className="bg-white divide-y divide-gray-200">
                                        {data.map((item, index) => (
                                            <tr key={index} className="hover:bg-gray-50">
                                                {Object.values(item).map((value, i) => (
                                                    <td key={i} className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                        {typeof value === 'boolean' ? (value ? 'Yes' : 'No') : String(value)}
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            {data.length === 0 && (
                                <div className="px-6 py-12 text-center">
                                    <Icon name="database" size={48} className="text-gray-400 mx-auto mb-4" />
                                    <p className="text-gray-500">No data components available</p>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.render(<ComponentsPage />, document.getElementById('root'));
    </script>
</body>
</html>
