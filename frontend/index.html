<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SumUp | Churn Alert Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; }
        .bar-fill { height: 100% !important; width: var(--val); }
        @media (min-width: 640px) {
            .bar-fill { width: 100% !important; height: var(--val); }
        }
        .enterprise-border { border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Icon Component for Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [data, setData] = useState({ 
                urgent_business: [], 
                general_outreach: [], 
                all_analyzed: [],
                stats: { total_churners: 0, high_value_businesses: 0, total_analyzed: 0, average_rating: 0 } 
            });
            const [loading, setLoading] = useState(true);
            const [refreshing, setRefreshing] = useState(false);
            const [chatOpen, setChatOpen] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'Hello! I\'m your churn analysis assistant. How can I help you today?' }
            ]);
            const [inputMessage, setInputMessage] = useState('');
            const [sessionId, setSessionId] = useState(null);

            const fetchData = async (isManual = false) => {
                if (isManual) setRefreshing(true);
                try {
                    if (isManual) {
                        // Only run the pipeline when manually refreshing
                        await fetch('http://localhost:8000/api/churn/run');
                    }
                    const response = await fetch('http://localhost:8000/api/churn/results');
                    const json = await response.json();
                    setData(json);
                } catch (err) {
                    console.error("Failed to fetch churn data:", err);
                } finally {
                    setLoading(false);
                    setRefreshing(false);
                }
            };

            useEffect(() => {
                fetchData();
            }, []);

            const calculateIssueStats = () => {
                const counts = {};
                (data.general_outreach || []).forEach(review => {
                    const issuesString = review.issue_list || "[]";
                    const issues = issuesString.slice(1, -1).split(',').map(i => i.trim().replace(/'/g, ''));
                    issues.forEach(issue => {
                        if (issue) counts[issue] = (counts[issue] || 0) + 1;
                    });
                });
                
                const colors = ["bg-[#0066FF]", "bg-[#3B82F6]", "bg-slate-800", "bg-slate-500", "bg-slate-300"];
                return Object.entries(counts)
                    .map(([label, value], idx) => ({
                        label: label === 'General Dissatisfaction' ? 'Other' : label,
                        value,
                        color: colors[idx % colors.length]
                    }))
                    .sort((a, b) => b.value - a.value)
                    .slice(0, 5);
            };

            const issueData = calculateIssueStats();
            const highRiskBusinesses = (data.urgent_business || []).slice(0, 2); 
            const totalIssueVolume = (data.stats || {}).total_churners || 0;
            const highValueBusinessCount = (data.stats || {}).high_value_businesses || 0;
            const averageRating = (data.stats || {}).average_rating || "0.0";
            const totalAnalyzed = (data.stats || {}).total_analyzed || 0;
            
            const calculateRetention = () => {
                const analyzed = data.all_analyzed || [];
                if (analyzed.length === 0) return 100;
                const avgChurn = analyzed.reduce((acc, curr) => acc + (curr.churn_score || 0), 0) / analyzed.length;
                return Math.max(5, 100 - avgChurn).toFixed(0);
            };
            const retentionProbability = calculateRetention();
            
            const formatRelativeTime = (ts) => {
                if (!ts) return "---";
                const diff = (Date.now() / 1000) - ts;
                if (diff < 60) return "Just now";
                const mins = Math.floor(diff / 60);
                if (mins < 60) return `${mins}m ago`;
                const hours = Math.floor(mins / 60);
                return `${hours}h ago`;
            };

            const handleSendMessage = async () => {
                if (!inputMessage.trim()) return;
                
                const userMessage = { role: 'user', content: inputMessage };
                setMessages(prev => [...prev, userMessage]);
                const messageText = inputMessage;
                setInputMessage('');
                
                // Add thinking indicator
                const thinkingMessage = { role: 'assistant', content: '...' };
                setMessages(prev => [...prev, thinkingMessage]);
                
                try {
                    const response = await fetch('http://localhost:8000/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            message: messageText,
                            session_id: sessionId 
                        })
                    });
                    
                    const data = await response.json();
                    
                    // Store session ID for conversation continuity
                    if (data.session_id) {
                        setSessionId(data.session_id);
                    }
                    
                    // Replace thinking message with actual response
                    setMessages(prev => {
                        const newMessages = [...prev];
                        newMessages[newMessages.length - 1] = {
                            role: 'assistant',
                            content: data.answer || 'I received your question but couldn\'t generate a response.'
                        };
                        return newMessages;
                    });
                } catch (error) {
                    console.error('Chat error:', error);
                    setMessages(prev => {
                        const newMessages = [...prev];
                        newMessages[newMessages.length - 1] = {
                            role: 'assistant',
                            content: 'Sorry, I encountered an error. Please make sure the analysis has been run and the chatbot is initialized.'
                        };
                        return newMessages;
                    });
                }
            };

            return (
                <div className="min-h-screen lg:h-screen p-4 md:p-6 flex flex-col overflow-y-auto lg:overflow-hidden bg-slate-50 text-slate-800">
                    <div className="max-w-7xl mx-auto w-full flex-1 flex flex-col space-y-4">
                        
                        {/* Global Navigation */}
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center px-5 py-4 shrink-0 bg-white border border-slate-200 rounded-xl shadow-sm">
                            <div className="flex items-center gap-4">
                                <div className="p-1">
                                    <img 
                                        src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/SumUp_Logo.svg/250px-SumUp_Logo.svg.png" 
                                        alt="SumUp" 
                                        className="h-5 w-auto"
                                    />
                                </div>
                                <div className="h-6 w-px bg-slate-200 hidden md:block" />
                                <div>
                                    <h1 className="text-base font-bold tracking-tight text-slate-800">Churn Intelligence Dashboard</h1>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex flex-col items-end mr-2">
                                    <span className="text-[10px] font-bold text-slate-400 leading-none">Last Synced</span>
                                    <span className="text-[10px] font-bold text-slate-600 tracking-tighter mt-1">{formatRelativeTime(data.stats?.last_updated)}</span>
                                </div>
                                <button 
                                    onClick={() => fetchData(true)}
                                    disabled={refreshing}
                                    className={`flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-200 text-[10px] font-bold uppercase tracking-widest transition-all ${refreshing ? 'bg-slate-50 text-slate-400' : 'bg-white text-slate-700 hover:bg-slate-50'}`}
                                >
                                    <Icon name={refreshing ? "loader-2" : "rotate-cw"} size={12} className={refreshing ? "animate-spin" : ""} />
                                    {refreshing ? "Syncing Logic..." : "Refresh Data"}
                                </button>
                                <a 
                                    href="/components.html"
                                    className="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-200 text-[10px] font-bold uppercase tracking-widest transition-all bg-white text-slate-700 hover:bg-slate-50"
                                >
                                    <Icon name="database" size={12} />
                                    Data Components
                                </a>
                                <div className="px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 shadow-sm shadow-emerald-200"></span>
                                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest leading-none">System Operational</span>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 min-h-0 overflow-auto">
                            <main className="grid grid-cols-1 lg:grid-cols-3 gap-4 h-full">
                            
                            {/* Analytics Viewport */}
                            <div className="lg:col-span-2 bg-white rounded-xl border border-slate-200 p-6 flex flex-col shadow-sm">
                                <div className="flex justify-between items-center mb-6 border-b border-slate-50 pb-4">
                                    <div>
                                        <h2 className="text-xs font-bold uppercase tracking-wider text-slate-400">Issue Volume Monitoring</h2>
                                        <p className="text-[10px] text-slate-400 mt-0.5">Automated categorization of merchant failure points (N={totalAnalyzed || 0})</p>
                                    </div>
                                    <Icon name="activity" size={16} className="text-[#0066FF]" />
                                </div>

                                <div className="flex-1 min-h-0">
                                    {(() => {
                                        const maxVal = Math.max(...issueData.map(d => d.value), 1);
                                        return (
                                            <div className="flex flex-col sm:grid sm:grid-cols-5 gap-6 sm:h-full pb-2">
                                                {issueData.length > 0 ? issueData.map((item, idx) => (
                                                    <div key={idx} className="flex flex-row sm:flex-col items-center gap-3 sm:gap-2 group sm:h-full">
                                                        <div className="flex-1 sm:w-full relative bg-slate-50 rounded-lg overflow-hidden h-3 sm:h-full min-h-[12px] sm:min-h-[40px] border border-slate-100">
                                                            <div 
                                                                className={`absolute left-0 bottom-0 transition-all duration-700 ease-out ${item.color} bar-fill`} 
                                                                style={{ '--val': `${(item.value / maxVal) * 95}%` }}
                                                            />
                                                        </div>
                                                        <div className="flex sm:flex-col items-center gap-2 sm:gap-0 min-w-[80px] sm:min-w-0">
                                                            <span className="text-[9px] font-bold text-slate-500 uppercase text-right sm:text-center leading-tight truncate w-full">
                                                                {item.label}
                                                            </span>
                                                            <span className="text-sm font-bold text-slate-700">{item.value}</span>
                                                        </div>
                                                    </div>
                                                )) : <div className="col-span-12 text-center text-slate-400 text-xs py-20">Monitoring in progress...</div>}
                                            </div>
                                        );
                                    })()}
                                </div>
                            </div>

                            {/* Summary Metadata */}
                            <div className="bg-white rounded-xl enterprise-border p-5 flex flex-col justify-between shadow-sm">
                                <div>
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-xs font-bold uppercase tracking-wider text-slate-400">Performance Spike</h2>
                                        <div className="w-8 h-8 rounded-lg bg-teal-50 text-teal-600 flex items-center justify-center">
                                            <Icon name="trending-up" size={16} />
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 rounded-lg p-5 border border-slate-100 flex flex-col gap-1">
                                        <p className="text-4xl font-bold text-slate-800 tracking-tighter">{totalIssueVolume}</p>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Review Events (6mo)</p>
                                    </div>
                                </div>
                            </div>

                            {/* Outreach Priority */}
                            <div className="bg-white rounded-xl enterprise-border p-5 flex flex-col h-full shadow-sm">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xs font-bold uppercase tracking-wider text-slate-400">Priority Outreach</h2>
                                    <div className="flex gap-1">
                                        <button className="p-1 px-2 rounded-md bg-slate-50 text-slate-400 hover:bg-slate-100">
                                            <Icon name="chevron-left" size={14} />
                                        </button>
                                        <button className="p-1 px-2 rounded-md bg-slate-100 text-slate-600">
                                            <Icon name="chevron-right" size={14} />
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-[#0066FF] rounded-xl p-5 relative flex flex-col justify-end flex-1 overflow-hidden group shadow-lg shadow-blue-500/10">
                                    <div className="relative z-10">
                                        <div className="flex items-center gap-2 mb-3">
                                            <span className="text-6xl font-bold text-white tracking-tighter leading-none">{String(highValueBusinessCount).padStart(2, '0')}</span>
                                            <div className="px-1.5 py-0.5 bg-white/20 rounded-md text-[8px] font-bold text-white uppercase tracking-[0.15em] backdrop-blur-sm">Action Needed</div>
                                        </div>
                                        <p className="text-[10px] font-medium text-blue-50 leading-relaxed uppercase tracking-wider max-w-[150px]">
                                            Critical accounts currently flagged<br />for immediate merchant intervention.
                                        </p>
                                    </div>
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-10 -mt-10 blur-xl" />
                                </div>
                            </div>

                            {/* Data Registry View */}
                            <div className="lg:col-span-2 bg-white rounded-xl enterprise-border p-6 grid grid-cols-1 md:grid-cols-2 gap-8 shadow-sm">
                                
                                <div className="border-r border-slate-50 pr-8">
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center">
                                            <Icon name="table" size={16} />
                                        </div>
                                        <h2 className="text-xs font-bold uppercase tracking-wider text-slate-400">Action Registry Log</h2>
                                    </div>
                                    
                                    <div className="space-y-1 relative">
                                        {(highRiskBusinesses || []).length > 0 ? highRiskBusinesses.map((biz, idx) => (
                                            <div key={idx} className="flex gap-3 p-3 rounded-lg hover:bg-slate-50 transition-all border border-transparent hover:border-slate-100 group cursor-pointer">
                                                <div className="flex flex-col items-center pt-1.5">
                                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-500" />
                                                </div>
                                                <div className="flex-1">
                                                    <p className="font-bold text-slate-700 text-[13px] leading-tight mb-1 group-hover:text-[#0066FF] transition-colors">{biz.name}</p>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-[9px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded border border-emerald-100">Score: {biz.churn_score}</span>
                                                        <span className="text-[9px] text-slate-400 font-medium uppercase truncate max-w-[150px]">{biz.clean_issues}</span>
                                                    </div>
                                                </div>
                                                <Icon name="external-link" size={12} className="text-slate-200 mt-2 opacity-0 group-hover:opacity-100" />
                                            </div>
                                        )) : <div className="py-12 text-center text-slate-300 text-[10px] font-bold uppercase tracking-widest">No Action Items Queued</div>}
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="bg-slate-50/50 p-5 rounded-xl border border-slate-100 flex flex-col justify-between flex-1 relative overflow-hidden group hover:border-slate-200 transition-colors">
                                        <div className="flex justify-between items-start">
                                            <span className="text-[10px] font-bold uppercase text-slate-400 tracking-widest leading-none mt-1">Merchant Sentiment</span>
                                            <div className="w-7 h-7 rounded-lg bg-teal-50 text-teal-600 flex items-center justify-center">
                                                <Icon name="star" size={14} />
                                            </div>
                                        </div>
                                        <div className="mt-3">
                                            <p className="text-4xl font-bold text-slate-800 leading-none">
                                                {averageRating}
                                                <span className="text-xs font-medium text-slate-400 ml-1.5 opacity-50">/ 5.0</span>
                                            </p>
                                            <div className="w-full h-1 bg-slate-200/50 rounded-full mt-4 overflow-hidden">
                                                <div 
                                                    className="h-full bg-emerald-500 transition-all duration-1000 ease-out" 
                                                    style={{ width: `${(parseFloat(averageRating) / 5) * 100}%` }} 
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-800 p-6 rounded-xl flex flex-col justify-between flex-1 relative overflow-hidden shadow-md shadow-slate-900/10">
                                        <div className="flex justify-between items-start relative z-10">
                                            <span className="text-[10px] font-bold uppercase text-slate-400 tracking-widest leading-none mt-1">Retention Forecast</span>
                                            <Icon name="shield-check" size={14} className="text-emerald-500" />
                                        </div>
                                        <div className="mt-4 text-white relative z-10">
                                            <p className="text-4xl font-bold leading-none tracking-tighter">{retentionProbability}%</p>
                                            <p className="text-[9px] font-medium text-slate-400 uppercase mt-2 tracking-[0.2em] opacity-60">AI Confidence Monitor</p>
                                        </div>
                                        <div className="absolute -bottom-8 -right-8 w-32 h-32 bg-white/5 rounded-full blur-2xl" />
                                    </div>
                                </div>

                            </div>

                        </main>
                        </div>

                        {/* Chatbot Widget */}
                        <div className="fixed bottom-6 right-6 z-50">
                            {/* Chat Window */}
                            {chatOpen && (
                                <div className="mb-4 w-96 h-[500px] bg-white rounded-xl border border-slate-200 shadow-2xl flex flex-col overflow-hidden">
                                    {/* Header */}
                                    <div className="bg-[#0066FF] text-white px-5 py-4 flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <div className="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center">
                                                <Icon name="bot" size={16} />
                                            </div>
                                            <div>
                                                <h3 className="text-sm font-bold">Churn Assistant</h3>
                                                <p className="text-[10px] opacity-75">AI-powered insights</p>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={() => setChatOpen(false)}
                                            className="p-1 hover:bg-white/20 rounded-lg transition-colors"
                                        >
                                            <Icon name="x" size={16} />
                                        </button>
                                    </div>
                                    
                                    {/* Messages */}
                                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
                                        {messages.map((msg, idx) => (
                                            <div 
                                                key={idx} 
                                                className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}
                                            >
                                                <div 
                                                    className={`max-w-[80%] px-4 py-2 rounded-xl text-sm ${
                                                        msg.role === 'user' 
                                                            ? 'bg-[#0066FF] text-white' 
                                                            : 'bg-white border border-slate-200 text-slate-700'
                                                    }`}
                                                >
                                                    {msg.content}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    {/* Input */}
                                    <div className="p-4 bg-white border-t border-slate-200">
                                        <div className="flex gap-2">
                                            <input
                                                type="text"
                                                value={inputMessage}
                                                onChange={(e) => setInputMessage(e.target.value)}
                                                onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                                                placeholder="Ask about churn insights..."
                                                className="flex-1 px-4 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0066FF] focus:border-transparent"
                                            />
                                            <button
                                                onClick={handleSendMessage}
                                                className="px-4 py-2 bg-[#0066FF] text-white rounded-lg hover:bg-[#0052CC] transition-colors"
                                            >
                                                <Icon name="send" size={16} />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                            
                            {/* Floating Button */}
                            <button
                                onClick={() => setChatOpen(!chatOpen)}
                                className="w-14 h-14 rounded-full shadow-2xl flex items-center justify-center transition-all hover:scale-110 overflow-hidden"
                            >
                                {chatOpen ? (
                                    <div className="bg-slate-800 w-full h-full flex items-center justify-center">
                                        <Icon name="x" size={24} className="text-white" />
                                    </div>
                                ) : (
                                    <img src="chatbot.png" alt="Chat" className="w-full h-full object-cover" />
                                )}
                            </button>
                        </div>


                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
